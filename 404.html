<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Página não encontrada — AZ Representações</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/png" href="/AZ-Landing-Page/assets/logo-az-purple.png" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(ellipse at 50% 30%, #1d1726 0%, #07050a 70%);
    color: #ede6da;
    font-family: "Cormorant Garamond", "Times New Roman", serif;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    min-height: 100vh;
  }
  .wrap { max-width: 560px; }
  .brand {
    font-family: "Bodoni Moda", "Didot", serif;
    font-size: 13px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #b8a082;
    margin-bottom: 40px;
  }
  .code {
    font-family: "Bodoni Moda", "Didot", serif;
    font-size: clamp(72px, 18vw, 140px);
    font-weight: 300;
    line-height: 1;
    color: #ede6da;
  }
  .rule { width: 48px; height: 1px; background: #b8a082; opacity: 0.6; margin: 28px auto; }
  h1 { font-size: clamp(22px, 5vw, 30px); font-weight: 400; color: #c9c1b4; margin-bottom: 14px; }
  p { font-size: 17px; color: #8a8276; line-height: 1.6; margin-bottom: 36px; }
  a.home {
    display: inline-block;
    font-family: "Manrope", -apple-system, sans-serif;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #ede6da;
    text-decoration: none;
    border: 1px solid rgba(184, 160, 130, 0.4);
    padding: 14px 30px;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  a.home:hover { background: #b8a082; color: #07050a; border-color: #b8a082; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">AZ · Representações</div>
    <div class="code">404</div>
    <div class="rule"></div>
    <h1>Página não encontrada</h1>
    <p>O endereço que você buscou não existe ou foi movido.</p>
    <a class="home" href="/AZ-Landing-Page/">Voltar ao início</a>
  </div>
</body>
</html>
