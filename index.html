<style>
/* ============================================================
   AZ Representações — Galeria Noturna
   ============================================================ */

:root {
  --ink-0: #07050a;
  --ink-1: #0b0810;
  --ink-2: #14101a;
  --ink-3: #1d1726;
  --plum-deep: #2a1432;
  --plum: #3d1f4a;
  --plum-mid: #4f2a5f;
  --plum-soft: #6e4682;
  --cream: #ede6da;
  --cream-2: #c9c1b4;
  --cream-3: #8a8276;
  --champagne: #b8a082;
  --bronze: #7a6448;
  --display: "Bodoni Moda", "Didot", "Times New Roman", serif;
  --serif: "Cormorant Garamond", "Times New Roman", serif;
  --sans: "Manrope", -apple-system, sans-serif;
  --gutter: clamp(20px, 4vw, 64px);
  --page-max: 1440px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

/* Remove o contorno azul ao tocar/clicar (mobile e mouse), mantendo o anel
   de foco para navegação por teclado (acessibilidade). */
:focus:not(:focus-visible) { outline: none; }
button, a { -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--ink-0);
  color: var(--cream);
  font-family: var(--sans);
  font-weight: 300;
  font-size: 16px;
  line-height: 1.55;
  letter-spacing: 0.01em;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body { min-height: 100vh; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }
::selection { background: var(--plum); color: var(--cream); }

/* Side chapter indicator — removido de ambos os modos */
.side-index { display: none !important; }
.side-index .si-item {
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: var(--serif);
  font-style: italic;
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--cream-3);
  opacity: 0.55;
  transition: opacity 0.4s ease, color 0.4s ease;
  cursor: pointer;
  text-decoration: none;
}
.side-index .si-item:hover { opacity: 1; color: var(--cream-2); }
.side-index .si-item .roman {
  font-family: var(--display);
  font-style: normal;
  font-size: 10px;
  letter-spacing: 0.12em;
  width: 18px;
  text-align: right;
}
.side-index .si-item .tick {
  width: 18px; height: 1px;
  background: currentColor;
  opacity: 0.5;
  transition: width 0.5s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease;
}
.side-index .si-item.active { opacity: 1; color: var(--cream); }
.side-index .si-item.active .tick {
  width: 42px;
  opacity: 1;
  background: var(--champagne);
}
.side-index .si-item .si-label {
  font-family: var(--sans);
  font-style: normal;
  font-size: 9px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: inherit;
  opacity: 0;
  transform: translateX(-6px);
  transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.16,1,0.3,1);
  white-space: nowrap;
}
.side-index .si-item:hover .si-label,
.side-index .si-item.active .si-label { opacity: 1; transform: translateX(0); }

@media (max-width: 980px) { .side-index { display: none; } }

.section-eyebrow {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 8px;
}
.section-eyebrow .roman {
  font-family: var(--display);
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 0.28em;
  color: var(--champagne);
}
.section-eyebrow .rule {
  width: 36px; height: 1px;
  background: var(--cream-3);
  opacity: 0.5;
}
.section-eyebrow .label {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.36em;
  text-transform: uppercase;
  color: var(--cream-2);
}

/* Marquee */
.marquee {
  position: relative;
  overflow: hidden;
  padding: 28px 0;
  border-top: 1px solid rgba(237, 230, 218, 0.18);
  border-bottom: 1px solid rgba(237, 230, 218, 0.18);
  background-color: var(--ink-0);
  box-shadow: inset 0 5px 14px rgba(0,0,0,0.55), inset 0 -5px 14px rgba(0,0,0,0.55);
  mask-image: linear-gradient(90deg, transparent 0%, #000 8%, #000 92%, transparent 100%);
  -webkit-mask-image: linear-gradient(90deg, transparent 0%, #000 8%, #000 92%, transparent 100%);
}
.marquee::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url('assets/image.jpg');
  background-size: auto 100%;
  background-repeat: repeat-x;
  background-position: 0 center;
  animation: fabric-scroll 80s linear infinite;
  filter: brightness(3) contrast(1.3);
  z-index: 0;
}
.marquee-track {
  position: relative;
  z-index: 1;
  display: flex;
  gap: 64px;
  white-space: nowrap;
  animation: marquee-scroll 80s linear infinite;
  width: max-content;
}
.marquee-item {
  display: inline-flex;
  align-items: center;
  gap: 18px;
  font-family: var(--display);
  font-weight: 300;
  font-size: clamp(20px, 2.4vw, 32px);
  letter-spacing: 0.02em;
  color: var(--cream);
}
.marquee-item .dot {
  width: 4px; height: 4px;
  background: var(--plum-soft);
  border-radius: 50%;
  display: inline-block;
}
.marquee-item .country {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--cream-3);
  font-style: normal;
}
.marquee-item .ital { font-style: italic; color: var(--cream-2); }

@keyframes marquee-scroll {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
@keyframes fabric-scroll {
  from { background-position: 0 center; }
  to   { background-position: -3000px center; }
}

/* Drop cap */
.dropcap::first-letter {
  font-family: var(--display);
  font-weight: 400;
  /* opsz baixo p/ engrossar a perna fina do A (ver .hero-title) */
  font-optical-sizing: none;
  font-variation-settings: "opsz" 26, "wght" 400;
  font-size: 5.8em;
  float: left;
  line-height: 0.82;
  margin: 0.05em 0.12em 0 0;
  color: var(--cream);
  font-style: italic;
}
/* No mobile o drop cap gigante em itálico ficava desproporcional e encostava
   nas bordas do texto ("cortado"). Reduz e dá folga para respirar. */
@media (max-width: 760px) {
  .dropcap::first-letter {
    font-size: 3.4em;
    line-height: 0.92;
    margin: 0.02em 0.16em 0 0;
  }
}

/* ============================================================
   Reveal animations
   ============================================================ */
@keyframes revealIn {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}
.reveal {
  opacity: 0;
  transform: translateY(28px);
  will-change: opacity, transform;
}
.reveal.in {
  animation: revealIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
.reveal.d1.in { animation-delay: 0.06s; }
.reveal.d2.in { animation-delay: 0.12s; }
.reveal.d3.in { animation-delay: 0.18s; }
.reveal.d4.in { animation-delay: 0.24s; }
.reveal.d5.in { animation-delay: 0.3s; }
.reveal.revealed-final {
  opacity: 1 !important;
  transform: translateY(0) !important;
  animation: none !important;
}

/* Slide-up cinematic reveal (hero title) */
@keyframes slideUp {
  from { transform: translateY(110%); }
  to   { transform: translateY(0); }
}
.line-mask {
  display: block;
  overflow: hidden;
  padding-bottom: 1.2em;
  margin-bottom: -1.2em;
}
.reveal-slide {
  display: block;
  transform: translateY(110%);
  will-change: transform;
}
.reveal-slide.in {
  animation: slideUp 1.15s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
.reveal-slide.d1.in { animation-delay: 0.08s; }
.reveal-slide.d2.in { animation-delay: 0.22s; }
.reveal-slide.d3.in { animation-delay: 0.36s; }
.reveal-slide.revealed-final {
  transform: translateY(0) !important;
  animation: none !important;
}

/* ============================================================
   Type utilities
   ============================================================ */
.eyebrow {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--cream-3);
  white-space: nowrap;
}
.eyebrow .dash {
  display: inline-block;
  width: 28px; height: 1px;
  background: var(--cream-3);
  vertical-align: middle;
  margin-right: 18px;
  transform: translateY(-2px);
}
.italic { font-style: italic; }

/* ============================================================
   Nav
   ============================================================ */
.nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  isolation: isolate;
  padding: 24px var(--gutter);
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background 0.5s ease, backdrop-filter 0.5s ease,
              padding 0.5s ease, box-shadow 0.5s ease, border-color 0.5s ease;
}
.nav.scrolled {
  background: linear-gradient(135deg,
    rgba(42, 18, 54, 0.90) 0%,
    rgba(14, 8, 22, 0.92) 100%
  );
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  padding: 16px var(--gutter);
  border-bottom: 1px solid rgba(184, 160, 130, 0.22);
  box-shadow: 0 8px 40px rgba(7, 5, 10, 0.45);
}
/* Navbar sobre o carrossel full-bleed: transparente com scrim suave (estilo Sierra) */
.nav.over-media {
  background: linear-gradient(to bottom,
    rgba(8, 5, 12, 0.55) 0%,
    rgba(8, 5, 12, 0.28) 45%,
    rgba(8, 5, 12, 0) 100%);
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
  border-bottom-color: transparent;
  box-shadow: none;
}
.nav-logo {
  display: block;
  height: 56px;
  width: auto;
  transition: height 0.5s ease, filter 0.4s ease;
  filter: drop-shadow(0 0 24px rgba(110, 70, 130, 0.22));
}
.nav.scrolled .nav-logo {
  height: 44px;
  filter: drop-shadow(0 0 20px rgba(110, 70, 130, 0.35))
          drop-shadow(0 0 8px rgba(184, 160, 130, 0.18));
}
.nav-mark:hover .nav-logo { filter: drop-shadow(0 0 32px rgba(142, 95, 168, 0.55)); }
.nav-mark { display: block; line-height: 0; }
.nav-links {
  display: flex;
  gap: 40px;
  font-size: 11px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--cream-2);
}
.nav-links a {
  position: relative;
  padding: 6px 0;
  transition: color 0.3s ease;
}
.nav-links a::after {
  content: "";
  position: absolute;
  left: 0; bottom: 0;
  width: 0; height: 1px;
  background: var(--champagne);
  transition: width 0.4s cubic-bezier(0.16,1,0.3,1);
}
.nav-links a:hover { color: var(--cream); }
.nav-links a:hover::after { width: 100%; }

/* Flash ao clicar — feedback suave */
@keyframes navFlash {
  0%   { color: var(--champagne); opacity: 1; }
  60%  { color: var(--champagne); opacity: 0.7; }
  100% { color: inherit; opacity: 1; }
}
.nav-links a.nav-flash {
  animation: navFlash 0.55s ease forwards;
}
.nav-links a.nav-flash::after { width: 100%; }

@media (max-width: 760px) { .nav-links { display: none; } }

/* Controles à direita da navbar + menu mobile (hambúrguer) */
.nav-controls { display: flex; align-items: center; gap: 2px; }
.nav-burger {
  display: none;
  width: 36px; height: 36px;
  border: 0; background: transparent; cursor: pointer;
  padding: 9px; margin-left: 6px;
  flex-direction: column; justify-content: center; gap: 5px;
  flex-shrink: 0;
}
.nav-burger span {
  display: block; width: 100%; height: 1.5px;
  background: var(--cream-2);
  border-radius: 2px;
  transition: transform 0.35s cubic-bezier(0.16,1,0.3,1), opacity 0.25s ease, background 0.4s ease;
}
.nav.menu-open .nav-burger span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.nav.menu-open .nav-burger span:nth-child(2) { opacity: 0; }
.nav.menu-open .nav-burger span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
.nav.over-media .nav-burger span { background: #f4efe4; }

.nav-mobile {
  display: none;
  position: absolute;
  top: 100%; left: 0; right: 0;
  flex-direction: column;
  background: linear-gradient(135deg, rgba(42,18,54,0.97) 0%, rgba(14,8,22,0.98) 100%);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(184,160,130,0.22);
  box-shadow: 0 22px 50px rgba(7,5,10,0.5);
  padding: 6px var(--gutter) 22px;
  opacity: 0;
  transform: translateY(-12px);
  pointer-events: none;
  transition: opacity 0.35s ease, transform 0.4s cubic-bezier(0.16,1,0.3,1);
}
.nav-mobile a {
  font-family: var(--display);
  font-size: 21px;
  font-weight: 300;
  letter-spacing: 0.04em;
  /* cor FIXA (não usar var(--cream), que inverte no modo claro e some) */
  color: #f4efe4;
  padding: 15px 2px;
  border-bottom: 1px solid rgba(184,160,130,0.12);
}
.nav-mobile a:last-child { border-bottom: 0; }
.nav-mobile-ig {
  font-family: var(--sans) !important;
  font-size: 12px !important;
  letter-spacing: 0.22em !important;
  text-transform: uppercase;
  color: var(--champagne) !important;
  margin-top: 10px;
}
/* Modo claro: menu mobile com fundo claro (igual à navbar clara) + texto escuro,
   senão fica roxo escuro com texto invisível. */
[data-theme="light"] .nav-mobile {
  background: linear-gradient(135deg, rgba(212,188,148,0.98) 0%, rgba(196,168,122,0.98) 100%);
  border-bottom-color: rgba(61,42,20,0.18);
  box-shadow: 0 22px 50px rgba(120,95,55,0.28);
}
[data-theme="light"] .nav-mobile a {
  color: #3d2a14;
  border-bottom-color: rgba(61,42,20,0.14);
}
[data-theme="light"] .nav-mobile-ig {
  color: #6b4e28 !important;
}

@media (max-width: 760px) {
  .nav-burger { display: flex; }
  .nav-mobile { display: flex; }
  .nav.menu-open .nav-mobile { opacity: 1; transform: translateY(0); pointer-events: auto; }
}

/* ============================================================
   Hero
   ============================================================ */
.hero {
  position: relative;
  min-height: 100vh;
  padding: 0 var(--gutter);
  display: flex;
  align-items: center;
  overflow: hidden;
}
.hero-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  background: var(--ink-0);
}
.hero-overlay {
  position: absolute;
  inset: 0;
  z-index: 1;
  background:
    linear-gradient(180deg,
      rgba(7, 5, 10, 0.62) 0%,
      rgba(11, 8, 16, 0.48) 50%,
      rgba(7, 5, 10, 0.72) 100%),
    radial-gradient(ellipse at 50% 35%, rgba(61, 31, 74, 0.35) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 90%, rgba(184, 160, 130, 0.18) 0%, transparent 55%);
}
.hero-bg-noise {
  position: absolute;
  inset: 0;
  z-index: 4;
  opacity: 0.35;
  mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.93 0 0 0 0 0.9 0 0 0 0 0.85 0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
}
.hero-content {
  position: relative;
  z-index: 2;
  max-width: var(--page-max);
  margin: 0 auto;
  width: 100%;
  padding-top: clamp(72px, 11vh, 120px);
  padding-bottom: clamp(40px, 6vh, 80px);
}
.hero-eyebrow {
  margin-bottom: 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}

.hero-title {
  font-family: var(--display);
  font-weight: 400;
  /* Bodoni Moda é fonte variável (eixo opsz). Sem controle, o navegador usa
     opsz alto em tamanhos grandes → contraste máximo → hastes finas (perna do
     A, diagonais do M) viram fio de cabelo. Fixamos opsz baixo + peso 400 para
     engrossar as finas e deixar a espessura mais uniforme. */
  font-optical-sizing: none;
  /* opsz BEM baixo: o título usa background-clip:text (gradiente shimmer), e
     traços finos somem no anti-aliasing. opsz baixo engrossa as finas (traço
     do meio do A/t, hastes do R) para elas sobreviverem ao recorte. */
  font-variation-settings: "opsz" 18, "wght" 400;
  font-size: clamp(48px, min(10.5vw, 13vh), 168px);
  line-height: 1.08;
  letter-spacing: -0.035em;
  color: var(--cream);
  margin-bottom: 28px;
}
.hero-title .line {
  display: block;
  padding-bottom: 0.25em;
  background: linear-gradient(90deg,
    var(--cream) 0%, var(--cream) 30%,
    #f2e2c0 50%,
    var(--cream) 70%, var(--cream) 100%
  );
  background-size: 250% auto;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: text-shimmer 9s ease-in-out infinite;
}
.hero-title .accent {
  font-style: italic;
  font-weight: 400;
  font-optical-sizing: none;
  font-variation-settings: "opsz" 18, "wght" 400;
  background: linear-gradient(90deg,
    var(--cream-2) 0%, var(--cream-2) 30%,
    var(--champagne) 50%,
    var(--cream-2) 70%, var(--cream-2) 100%
  );
  background-size: 250% auto;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: text-shimmer 9s ease-in-out infinite;
}
.hero-title .ampersand {
  font-style: italic;
  margin-left: -0.06em;
  display: inline-block;
  background: linear-gradient(90deg,
    var(--plum-soft) 0%, var(--plum-soft) 30%,
    #9060b8 50%,
    var(--plum-soft) 70%, var(--plum-soft) 100%
  );
  background-size: 250% auto;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: text-shimmer 9s ease-in-out infinite;
}
@keyframes text-shimmer {
  0%   { background-position: 150% center; }
  50%  { background-position: -50% center; }
  100% { background-position: 150% center; }
}
.hero-watermark {
  position: absolute;
  inset: 0;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  overflow: hidden;
}
.hero-watermark img {
  width: clamp(380px, 62vw, 860px);
  opacity: 0.045;
  filter: brightness(4) grayscale(1);
  user-select: none;
  -webkit-user-select: none;
  pointer-events: none;
}
.hero-credentials {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px 14px;
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--cream-3);
  margin-bottom: clamp(20px, 4vh, 36px);
}
.hero-credentials::before {
  content: '';
  display: block;
  flex-shrink: 0;
  width: 28px;
  height: 1px;
  background: linear-gradient(90deg, var(--champagne), transparent);
  opacity: 0.7;
}
.hero-credentials .cred-sep {
  color: var(--plum-soft);
  opacity: 0.7;
}
.hero-meta {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 40px;
  align-items: end;
  margin-top: clamp(28px, 5vh, 80px);
  padding-top: clamp(16px, 3vh, 32px);
  border-top: 1px solid rgba(237, 230, 218, 0.08);
}
.hero-tagline {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 300;
  font-size: clamp(18px, 1.8vw, 24px);
  line-height: 1.4;
  color: var(--cream-2);
  max-width: 460px;
}
.hero-tagline em { color: var(--champagne); font-style: italic; }
.scroll-cue {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 14px;
  font-size: 10px;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: var(--cream-3);
}
.scroll-cue .bar {
  position: relative;
  width: 1px; height: 56px;
  background: rgba(237, 230, 218, 0.18);
  overflow: hidden;
}
.scroll-cue .bar::after {
  content: "";
  position: absolute;
  top: -56px; left: 0;
  width: 1px; height: 56px;
  background: var(--champagne);
  animation: scrollCue 2.4s cubic-bezier(0.65, 0, 0.35, 1) infinite;
}
@keyframes scrollCue {
  0% { transform: translateY(0); }
  60% { transform: translateY(112px); }
  100% { transform: translateY(112px); }
}
@media (max-width: 720px) {
  .hero-meta { grid-template-columns: 1fr; gap: 28px; }
  .scroll-cue { align-items: flex-start; flex-direction: row; align-items: center; }
  .scroll-cue .bar { width: 56px; height: 1px; }
}

/* Hero no mobile: afasta o conteúdo da navbar e evita corte do eyebrow */
@media (max-width: 760px) {
  .hero { align-items: flex-start; }
  .hero-content { padding-top: clamp(116px, 17vh, 150px); }
  .eyebrow { white-space: normal; line-height: 1.7; }
  .eyebrow .dash { display: none; }
  .hero-eyebrow { margin-bottom: 28px; }
  .hero-title { font-size: clamp(40px, 11vw, 62px); }
}

/* ============================================================
   Section base
   ============================================================ */
.section { position: relative; padding: clamp(80px, 12vw, 160px) var(--gutter); }
.section-inner { max-width: var(--page-max); margin: 0 auto; width: 100%; }
.section-head {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 80px;
  align-items: end;
  margin-bottom: 80px;
}
.section-head .head-left { display: flex; flex-direction: column; gap: 24px; }
.section-title {
  font-family: var(--display);
  font-weight: 300;
  font-size: clamp(38px, 5.5vw, 84px);
  line-height: 1.02;
  letter-spacing: -0.025em;
  color: var(--cream);
}
.section-title em { font-style: italic; color: var(--champagne); }
.section-lead {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 300;
  font-size: clamp(18px, 1.55vw, 22px);
  line-height: 1.55;
  color: var(--cream-2);
  max-width: 540px;
}
@media (max-width: 880px) {
  .section-head { grid-template-columns: 1fr; gap: 32px; margin-bottom: 56px; }
}

/* ============================================================
   Sobre
   ============================================================ */
.sobre { position: relative; z-index: 1; }
.sobre-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
  align-items: start;
}
.sobre-text p {
  font-size: 15px;
  line-height: 1.85;
  color: var(--cream-2);
  margin-bottom: 22px;
  font-weight: 300;
}
.sobre-text p:first-of-type {
  font-family: var(--serif);
  font-size: clamp(20px, 1.8vw, 26px);
  line-height: 1.5;
  font-style: italic;
  color: var(--cream);
  margin-bottom: 32px;
}
.sobre-stats {
  margin-top: 56px;
  padding-top: 40px;
  border-top: 1px solid rgba(184, 160, 130, 0.22);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 32px;
}
.stat .num {
  font-family: var(--serif);
  font-weight: 300;
  font-size: clamp(40px, 4.5vw, 60px);
  line-height: 1;
  color: var(--champagne);
  letter-spacing: -0.02em;
}
.stat .num em { color: var(--plum-soft); font-style: italic; }
.stat .label {
  margin-top: 12px;
  font-size: 11px;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--cream-3);
}
@media (max-width: 880px) {
  .sobre-stats { grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .stat .num { font-size: 36px; }
}

/* ============================================================
   Image placeholder
   ============================================================ */
.img-placeholder {
  position: relative;
  background:
    repeating-linear-gradient(135deg,
      rgba(237, 230, 218, 0.025) 0px,
      rgba(237, 230, 218, 0.025) 1px,
      transparent 1px,
      transparent 14px),
    linear-gradient(135deg, var(--ink-2) 0%, var(--ink-3) 60%, var(--ink-2) 100%);
  overflow: hidden;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(237, 230, 218, 0.06);
}
.img-placeholder::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 30% 30%, rgba(184, 160, 130, 0.08) 0%, transparent 55%);
}
.img-placeholder .label {
  position: relative;
  z-index: 2;
  font-family: "Courier New", monospace;
  font-size: 10px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: rgba(237, 230, 218, 0.4);
  text-align: center;
  padding: 16px;
  line-height: 1.8;
}
.img-placeholder .label::before { content: "["; margin-right: 6px; color: rgba(184, 160, 130, 0.45); }
.img-placeholder .label::after  { content: "]"; margin-left: 6px;  color: rgba(184, 160, 130, 0.45); }

/* ============================================================
   Galeria (Coleção)
   ============================================================ */
.categorias { position: relative; z-index: 1; }
.gallery { display: flex; flex-direction: column; gap: clamp(80px, 10vw, 140px); }
.gallery-block { display: grid; grid-template-columns: 1fr; gap: 40px; }
.gb-head {
  display: grid;
  grid-template-columns: 60px 1fr 1.4fr;
  gap: 40px;
  align-items: end;
  padding-bottom: 32px;
  border-bottom: 1px solid rgba(237, 230, 218, 0.1);
}
.gb-num {
  font-family: var(--display);
  font-style: italic;
  font-weight: 300;
  font-size: 28px;
  color: var(--champagne);
  line-height: 1;
}
.gb-name {
  font-family: var(--display);
  font-weight: 300;
  font-size: clamp(34px, 4.4vw, 64px);
  line-height: 1;
  letter-spacing: -0.022em;
  color: var(--cream);
}
.gb-desc { font-size: 14px; line-height: 1.7; color: var(--cream-3); max-width: 460px; padding-bottom: 4px; }
@media (max-width: 880px) { .gb-head { grid-template-columns: 1fr; gap: 16px; } }
.gb-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; align-items: start; }
.gb-shot { position: relative; overflow: hidden; }
.gb-shot .img-placeholder { aspect-ratio: 4 / 5; }
.gb-shot.fmt-wide   { grid-column: span 6; }
.gb-shot.fmt-wide  .img-placeholder { aspect-ratio: 4 / 3; }
.gb-shot.fmt-tall   { grid-column: span 3; }
.gb-shot.fmt-tall  .img-placeholder { aspect-ratio: 3 / 5; }
.gb-shot.fmt-square { grid-column: span 3; }
.gb-shot.fmt-square .img-placeholder { aspect-ratio: 1 / 1; }
.gb-shot.fmt-portrait { grid-column: span 6; }
.gb-shot.fmt-portrait .img-placeholder { aspect-ratio: 4 / 5; }
/* imagens reais */
.gb-shot img { width: 100%; height: auto; display: block; object-fit: cover; }
.gb-shot.fmt-wide     img { aspect-ratio: 4 / 3; }
.gb-shot.fmt-tall     img { aspect-ratio: 3 / 5; }
.gb-shot.fmt-square   img { aspect-ratio: 1 / 1; }
.gb-shot.fmt-portrait img { aspect-ratio: 4 / 5; }
.gb-shot figcaption {
  margin-top: 14px;
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--cream-3);
  line-height: 1.5;
}
.gallery-block:nth-child(even) .gb-grid { direction: rtl; }
.gallery-block:nth-child(even) .gb-grid > * { direction: ltr; }
@media (max-width: 880px) {
  .gb-grid { gap: 16px; }
  .gb-shot.fmt-wide,
  .gb-shot.fmt-tall,
  .gb-shot.fmt-square,
  .gb-shot.fmt-portrait { grid-column: span 6; }
  .gb-shot.fmt-wide  .img-placeholder { aspect-ratio: 4 / 3; }
  .gb-shot.fmt-tall  .img-placeholder { aspect-ratio: 3 / 4; }
  .gb-shot.fmt-square .img-placeholder { aspect-ratio: 1 / 1; }
  .gb-shot.fmt-portrait .img-placeholder { aspect-ratio: 4 / 5; }
  .gb-shot.fmt-wide     img { aspect-ratio: 4 / 3; }
  .gb-shot.fmt-tall     img { aspect-ratio: 3 / 4; }
  .gb-shot.fmt-square   img { aspect-ratio: 1 / 1; }
  .gb-shot.fmt-portrait img { aspect-ratio: 4 / 5; }
}

/* Carrossel de ambientes — tela cheia (estilo Sierra) */
.gallery { gap: 0; }
.carousel { position: relative; width: 100vw; margin-left: calc(50% - 50vw); height: 100vh; overflow: hidden; background: #0d0a12; }
.carousel-stack { position: absolute; inset: 0; }
.carousel-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1.1s ease; }
.carousel-slide.active { opacity: 1; z-index: 1; }
.carousel-slide .slide-img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; transform: scale(1.06); transition: transform 6s ease-out; }
.carousel-slide.active .slide-img { transform: scale(1); }
.carousel-slide .slide-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: blur(34px) brightness(0.45); transform: scale(1.15); z-index: 0; }
.carousel-slide .slide-img.fit-contain { object-fit: contain; position: relative; z-index: 1; }
.carousel-slide picture { position: absolute; inset: 0; display: block; } /* wrapper do <picture> (2 versões web/celular) preenche o painel */
.carousel-slide .img-placeholder { width: 100%; height: 100%; }
.carousel-scrim {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background:
    linear-gradient(to top, rgba(8,5,12,0.82) 0%, rgba(8,5,12,0.38) 26%, rgba(8,5,12,0) 50%),
    linear-gradient(to bottom, rgba(8,5,12,0.45) 0%, rgba(8,5,12,0) 20%);
}
.carousel-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 60px; height: 60px; border-radius: 50%;
  border: 1px solid rgba(216, 189, 147, 0.45);
  background: rgba(18, 14, 24, 0.22); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  color: #f4efe4;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.4s ease, border-color 0.4s ease, color 0.4s ease, transform 0.4s ease; z-index: 4;
}
.carousel-arrow svg { width: 22px; height: 22px; transition: transform 0.4s ease; }
.carousel-arrow:hover { background: rgba(184, 160, 130, 0.95); border-color: var(--champagne); color: #1d1726; transform: translateY(-50%) scale(1.07); }
.carousel-arrow.prev:hover svg { transform: translateX(-3px); }
.carousel-arrow.next:hover svg { transform: translateX(3px); }
.carousel-arrow.prev { left: clamp(16px, 3vw, 44px); }
.carousel-arrow.next { right: clamp(16px, 3vw, 44px); }
.carousel-title { position: absolute; left: var(--gutter); bottom: 13vh; z-index: 3; max-width: 80%; text-shadow: 0 2px 24px rgba(0, 0, 0, 0.55), 0 1px 4px rgba(0, 0, 0, 0.4); }
/* texto do carrossel SEMPRE claro (fica sobre foto escurecida, nos dois temas) */
.carousel-num { display: block; font-family: var(--display); font-style: italic; font-weight: 300; color: #d8bd93; font-size: 24px; margin-bottom: 6px; }
.carousel-name { font-family: var(--display); font-weight: 300; font-size: clamp(44px, 7vw, 112px); line-height: 0.95; letter-spacing: -0.02em; color: #f4efe4; margin: 0; }
.carousel-desc { margin: 14px 0 0; max-width: 420px; font-size: 14px; line-height: 1.6; color: #dcd5c8; }
.carousel-dots { position: absolute; right: var(--gutter); bottom: calc(13vh + 10px); display: flex; gap: 9px; z-index: 3; }
.carousel-dots .dot { width: 8px; height: 8px; padding: 0; border-radius: 50%; border: none; background: rgba(237, 230, 218, 0.35); cursor: pointer; transition: width 0.3s, background 0.3s, border-radius 0.3s; }
.carousel-dots .dot.active { width: 26px; border-radius: 4px; background: var(--champagne); }
@media (max-width: 880px) {
  .carousel-arrow { width: 48px; height: 48px; }
  .carousel-arrow svg { width: 18px; height: 18px; }
  .carousel-name { font-size: clamp(36px, 12vw, 64px); }
  .carousel-title { bottom: 15vh; }
  /* No mobile as bolinhas ficavam sobre o texto das fábricas (desc longa).
     Joga elas pro rodapé, centralizadas, abaixo do título. */
  .carousel-dots { left: var(--gutter); right: var(--gutter); bottom: 7vh; justify-content: center; }
}

/* ============================================================
   Marcas
   ============================================================ */
.marcas { position: relative; z-index: 1; }
.marcas-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 0;
  border-top: 1px solid rgba(237, 230, 218, 0.08);
  border-left: 1px solid rgba(237, 230, 218, 0.08);
}
.marca {
  aspect-ratio: 1 / 1;
  border-right: 1px solid rgba(237, 230, 218, 0.08);
  border-bottom: 1px solid rgba(237, 230, 218, 0.08);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: 14px;
  padding: 18px 16px 16px;
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 0 0 1px rgba(184, 160, 130, 0.07);
  transition: background 0.5s ease, box-shadow 0.5s ease;
}
.marca:hover {
  background: rgba(61, 31, 74, 0.2);
  box-shadow: inset 0 0 40px rgba(110, 70, 130, 0.08), inset 0 0 0 1px rgba(184, 160, 130, 0.22);
}
.marca::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 1px;
  background: linear-gradient(90deg, var(--champagne), var(--plum-soft));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.65s cubic-bezier(0.16,1,0.3,1);
}
.marca:hover::before { transform: scaleX(1); }
.marca-logo-frame {
  width: 100%;
  flex: 1 1 auto;
  min-height: 0;
  border: 1px solid rgba(237, 230, 218, 0.12);
  background: rgba(237, 230, 218, 0.96);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px;
  overflow: hidden;
}
.marca-logo-image,
.marca-logo-object {
  width: auto;
  height: auto;
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  display: block;
  transform: scale(var(--logo-scale, 1));
  transform-origin: center;
}
.marca-logo-object { border: 0; }
.marca-fallback {
  font-family: var(--display);
  font-size: 28px;
  color: var(--ink-2);
  letter-spacing: 0.04em;
}
.marca-copy {
  width: 100%;
  display: grid;
  gap: 4px;
  align-content: end;
  min-height: 36px;
}
.marca-name {
  font-family: var(--display);
  font-weight: 300;
  font-size: 18px;
  letter-spacing: 0.01em;
  color: var(--cream-2);
  transition: color 0.3s ease, letter-spacing 0.4s cubic-bezier(0.16,1,0.3,1);
}
.marca:hover .marca-name { color: var(--cream); letter-spacing: 0.04em; }
.marca-meta {
  font-size: 8px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--cream-3);
  transition: color 0.3s ease;
}
.marca:hover .marca-meta { color: var(--cream-2); }
@media (max-width: 980px) { .marcas-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
@media (max-width: 560px) {
  .marcas-grid { grid-template-columns: 1fr; }
  .marca { aspect-ratio: 1 / 1; }
}

/* ============================================================
   Contato
   ============================================================ */
.contato { position: relative; z-index: 1; }
.contato::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(61, 31, 74, 0.3) 0%, transparent 60%);
  pointer-events: none;
}
.contato-inner {
  position: relative;
  z-index: 2;
  max-width: 1100px;
  margin: 0 auto;
  text-align: center;
}
.contato-eyebrow { margin-bottom: 32px; }
.contato-title {
  font-family: var(--display);
  font-weight: 300;
  font-size: clamp(44px, 7vw, 108px);
  line-height: 1;
  letter-spacing: -0.035em;
  color: var(--cream);
  margin-bottom: 32px;
}
.contato-title em { font-style: italic; color: var(--champagne); }
.contato-lead {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 300;
  font-size: clamp(18px, 1.8vw, 24px);
  line-height: 1.55;
  color: var(--cream-2);
  max-width: 620px;
  margin: 0 auto 60px;
}
.whatsapp-cta {
  display: inline-flex;
  align-items: center;
  gap: 20px;
  padding: 26px 44px;
  background: var(--plum);
  color: var(--cream);
  border: 1px solid rgba(184, 160, 130, 0.45);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: background 0.5s ease, box-shadow 0.5s ease, border-color 0.5s ease;
}
.whatsapp-cta::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(184,160,130,0.12), transparent);
  transform: translateX(-100%);
  transition: transform 0.8s cubic-bezier(0.16,1,0.3,1);
}
.whatsapp-cta:hover {
  background: var(--plum-deep);
  border-color: rgba(184, 160, 130, 0.75);
  box-shadow: 0 0 32px rgba(184, 160, 130, 0.18);
}
.whatsapp-cta:hover::before { transform: translateX(100%); }
.whatsapp-cta .wa-icon { width: 18px; height: 18px; fill: currentColor; }
.whatsapp-cta .arrow { width: 18px; height: 1px; background: currentColor; position: relative; }
.whatsapp-cta .arrow::after {
  content: "";
  position: absolute;
  right: 0; top: 50%;
  width: 6px; height: 6px;
  border-right: 1px solid currentColor;
  border-top: 1px solid currentColor;
  transform: translate(2px, -50%) rotate(45deg);
}
.contato-secondary {
  margin-top: 80px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 48px;
  padding-top: 56px;
  border-top: 1px solid rgba(184, 160, 130, 0.2);
  text-align: left;
}
.contato-block .block-label {
  font-size: 10px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--cream-3);
  margin-bottom: 14px;
}
.contato-block .block-value {
  font-family: var(--serif);
  font-weight: 300;
  font-size: 20px;
  line-height: 1.4;
  color: var(--cream);
}
.contato-block .block-sub { margin-top: 6px; font-size: 13px; color: var(--cream-3); }
@media (max-width: 720px) { .contato-secondary { grid-template-columns: 1fr; gap: 28px; } }

/* ============================================================
   Footer
   ============================================================ */
.footer {
  padding: 48px var(--gutter) 36px;
  position: relative;
  z-index: 1;
  border-top: 1px solid rgba(184, 160, 130, 0.18);
  background: radial-gradient(ellipse at 50% 0%, rgba(184, 160, 130, 0.07) 0%, transparent 60%);
}
.footer-inner {
  max-width: var(--page-max);
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
}
.footer-logo { font-family: var(--serif); font-size: 14px; letter-spacing: 0.24em; color: var(--cream-2); }
.footer-mini { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--cream-3); }
.footer-social {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--cream-3);
  text-decoration: none;
  transition: color 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.footer-social svg { width: 17px; height: 17px; display: block; }
.footer-social:hover { color: var(--champagne); }

/* ============================================================
   Ambient glow — fixo, atrás de toda a página
   ============================================================ */
.ambient-glow {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.ag-orb {
  position: absolute;
  border-radius: 50%;
  will-change: transform, opacity;
}
/* Principal — berinjela, topo centro */
.ag-orb-1 {
  width: 900px;
  height: 900px;
  top: -30%;
  left: 50%;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(110, 70, 130, 1) 0%, rgba(61, 31, 74, 0.6) 40%, transparent 70%);
  filter: blur(60px);
  opacity: 0.55;
  animation: agPulse1 8s ease-in-out infinite;
}
/* Secundário — berinjela profundo, esquerda meio */
.ag-orb-2 {
  width: 700px;
  height: 700px;
  top: 30%;
  left: -15%;
  background: radial-gradient(circle, rgba(79, 42, 95, 1) 0%, transparent 65%);
  filter: blur(80px);
  opacity: 0.4;
  animation: agPulse2 11s ease-in-out infinite;
  animation-delay: -4s;
}
/* Terciário — champagne, direita baixo */
.ag-orb-3 {
  width: 680px;
  height: 680px;
  bottom: 5%;
  right: -8%;
  background: radial-gradient(circle, rgba(184, 160, 130, 0.9) 0%, rgba(184, 160, 130, 0.4) 35%, transparent 65%);
  filter: blur(70px);
  opacity: 0.38;
  animation: agPulse3 14s ease-in-out infinite;
  animation-delay: -8s;
}
@keyframes agPulse1 {
  0%, 100% { opacity: 0.55; transform: translateX(-50%) scale(1); }
  50%       { opacity: 0.75; transform: translateX(-50%) scale(1.08); }
}
@keyframes agPulse2 {
  0%, 100% { opacity: 0.4;  transform: translate(0, 0)   scale(1); }
  50%       { opacity: 0.55; transform: translate(4%, 6%) scale(1.06); }
}
@keyframes agPulse3 {
  0%, 100% { opacity: 0.38; transform: scale(1); }
  50%       { opacity: 0.52; transform: scale(1.12); }
}

/* Hero orbs (continuam, mais sutis agora) */
.hero-orbs { display: none; }

/* ============================================================
   Hero Furniture Drop
   ============================================================ */
.hero-furniture {
  position: absolute;
  right: clamp(24px, 5vw, 100px);
  bottom: clamp(160px, 27vh, 285px);
  z-index: 1;
  pointer-events: none;
  display: flex;
  align-items: flex-end;
  gap: 18px;
  /* Modo escuro (padrão): móveis na penumbra para combinar com o fundo.
     Transição suave ao alternar o tema. */
  filter: brightness(0.5) contrast(1.06) saturate(0.9) sepia(0.12)
          drop-shadow(0 0 7px rgba(190,170,140,0.16));
  transition: filter 0.6s ease;
}
[data-theme="light"] .hero-furniture {
  filter: none;
}
.furniture-chair {
  position: relative;
  opacity: 0;
  animation: furnitureDrop var(--drop-duration, 1.4s) cubic-bezier(0.2, 0.9, 0.24, 1) var(--drop-delay, 0s) both;
  transform-origin: bottom center;
  will-change: transform, opacity, filter;
}
.furniture-sofa {
  position: relative;
  opacity: 0;
  animation: furnitureDrop var(--drop-duration, 1.65s) cubic-bezier(0.2, 0.9, 0.24, 1) var(--drop-delay, 0s) both;
  transform-origin: bottom center;
  will-change: transform, opacity, filter;
}
.furniture-table {
  position: relative;
  opacity: 0;
  animation: furnitureDrop var(--drop-duration, 1.1s) cubic-bezier(0.2, 0.9, 0.24, 1) var(--drop-delay, 0s) both;
  transform-origin: bottom center;
  will-change: transform, opacity, filter;
}
@keyframes furnitureDrop {
  0% {
    opacity: 0;
    filter: blur(8px);
    transform: translate3d(var(--drop-x, 0px), -120vh, 0) scale(0.92) rotate(var(--drop-rot-start, 0deg));
  }
  18% {
    opacity: 1;
    filter: blur(2px);
  }
  68% {
    transform: translate3d(var(--drop-x, 0px), 16px, 0) scale(1.03) rotate(var(--drop-rot-mid, 0deg));
    filter: blur(0);
  }
  82% {
    transform: translate3d(var(--drop-x, 0px), -6px, 0) scale(0.995) rotate(calc(var(--drop-rot-mid, 0deg) * -0.35));
  }
  92% {
    transform: translate3d(var(--drop-x, 0px), 3px, 0) scale(1.002) rotate(calc(var(--drop-rot-mid, 0deg) * 0.15));
  }
  100% {
    opacity: 1;
    filter: blur(0);
    transform: translate3d(var(--drop-x, 0px), 0, 0) scale(1) rotate(0deg);
  }
}
.furniture-chair::after,
.furniture-sofa::after,
.furniture-table::after {
  content: '';
  position: absolute;
  bottom: -6px;
  left: 50%;
  width: 76%;
  height: 14px;
  transform: translateX(-50%);
  background: radial-gradient(ellipse, rgba(0,0,0,0.55) 0%, transparent 72%);
  opacity: 0;
  /* sombra de contato que "respira" devagar → ancora os móveis (não flutuam) */
  animation: shadowIn 0.5s ease 1.9s forwards, shadowPulse 3.6s ease-in-out 2.6s infinite;
}
@keyframes shadowIn { to { opacity: 1; } }
@keyframes shadowPulse {
  0%, 100% { transform: translateX(-50%) scaleX(1);    opacity: 0.85; }
  50%      { transform: translateX(-50%) scaleX(0.86); opacity: 0.55; }
}

/* Lustre */
.hero-chandelier {
  position: absolute;
  top: clamp(120px, 16vh, 172px);
  right: clamp(120px, 17vw, 210px);
  z-index: 1;
  pointer-events: none;
  transform-origin: 50% 0%;
  opacity: 0;
  animation: chandelierDrop 2.2s cubic-bezier(0.25, 1, 0.5, 1) 1.3s forwards;
}
.hero-chandelier::after {
  content: '';
  position: absolute;
  top: 92px;
  left: 50%;
  transform: translateX(-50%);
  width: 220px;
  height: 190px;
  background: linear-gradient(
    to bottom,
    rgba(188,170,150,0.14) 0%,
    rgba(188,170,150,0.04) 48%,
    transparent 100%
  );
  clip-path: polygon(50% 0%, 3% 100%, 97% 100%);
  opacity: 0;
  animation: glowOn 1.6s ease 3.2s forwards;
  pointer-events: none;
}
@keyframes chandelierDrop {
  0%   { opacity: 0; transform: translateY(-110px) rotate(0deg); }
  28%  { opacity: 1; transform: translateY(0) rotate(0deg); }
  42%  { transform: translateY(0) rotate(11deg); }
  55%  { transform: translateY(0) rotate(-7.5deg); }
  66%  { transform: translateY(0) rotate(4.5deg); }
  75%  { transform: translateY(0) rotate(-2.5deg); }
  83%  { transform: translateY(0) rotate(1.2deg); }
  90%  { transform: translateY(0) rotate(-0.5deg); }
  96%  { transform: translateY(0) rotate(0.2deg); }
  100% { opacity: 1; transform: translateY(0) rotate(0deg); }
}
@keyframes glowOn {
  0%   { opacity: 0; }
  40%  { opacity: 0.6; }
  100% { opacity: 1; }
}
@media (max-width: 860px) {
  .hero-furniture, .hero-chandelier { display: none; }
}

/* ============================================================
   Modo Claro — transição e paleta
   ============================================================ */

/* Helper de transição — ativado brevemente pelo JS ao trocar tema */
.theme-transitioning,
.theme-transitioning *,
.theme-transitioning *::before,
.theme-transitioning *::after {
  transition:
    background-color 0.55s ease,
    background 0.55s ease,
    color 0.45s ease,
    border-color 0.45s ease,
    box-shadow 0.5s ease,
    opacity 0.5s ease !important;
}

/* Paleta invertida — backgrounds viram cremes, textos viram escuros */
[data-theme="light"] {
  --ink-0: #f5efe1;
  --ink-1: #ede7d4;
  --ink-2: #e2d9c6;
  --ink-3: #d5ccb5;
  --cream:   #1d1726;
  --cream-2: #4a3860;
  --cream-3: #8a7898;
  --plum-deep: rgba(184, 160, 130, 0.09);
  --plum:      rgba(78, 42, 95, 0.10);
  --plum-mid:  rgba(78, 42, 95, 0.18);
  --plum-soft: #8050b0;
  --champagne: #7a5c38;
  --bronze:    #5c4428;
}

/* Seleção de texto */
[data-theme="light"] ::selection {
  background: rgba(78, 42, 95, 0.16);
  color: #1d1726;
}

/* Sidebar — champanhe no modo claro */
[data-theme="light"] .side-index .si-item {
  color: #9a7848;
  opacity: 0.7;
}
[data-theme="light"] .side-index .si-item:hover {
  color: #7a5c30;
  opacity: 1;
}
[data-theme="light"] .side-index .si-item.active {
  color: #5e4422;
  opacity: 1;
}
[data-theme="light"] .side-index .si-item.active .tick {
  background: #7a5c30;
  opacity: 1;
}

/* Nav — champanhe no modo claro */
[data-theme="light"] .nav {
  background: rgba(196, 168, 122, 0.10);
}
[data-theme="light"] .nav.scrolled {
  background: rgba(196, 168, 122, 0.90);
  border-bottom: 1px solid rgba(160, 128, 72, 0.30);
}
[data-theme="light"] .nav-links a { color: #3d2a14; }
[data-theme="light"] .nav-links a:hover { color: #1d1408; }
/* over-media tambem no modo claro (precisa vir depois de .nav.scrolled p/ vencer o desempate) */
[data-theme="light"] .nav.over-media {
  background: linear-gradient(to bottom,
    rgba(8, 5, 12, 0.55) 0%,
    rgba(8, 5, 12, 0.28) 45%,
    rgba(8, 5, 12, 0) 100%);
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
  border-bottom-color: transparent;
  box-shadow: none;
}
[data-theme="light"] .nav.over-media .nav-links a { color: var(--cream); }

/* Hero */
[data-theme="light"] .hero-bg { background: var(--ink-0); }
[data-theme="light"] .hero-overlay {
  background:
    linear-gradient(180deg,
      rgba(245, 239, 225, 0.88) 0%,
      rgba(237, 231, 213, 0.70) 50%,
      rgba(245, 239, 225, 0.93) 100%),
    radial-gradient(ellipse at 80% 90%, rgba(122, 92, 56, 0.10) 0%, transparent 55%);
}
[data-theme="light"] .hero-bg-noise { opacity: 0.08; }
[data-theme="light"] .hero-meta { border-top-color: rgba(42, 20, 50, 0.1); }
[data-theme="light"] .scroll-cue .bar { background: rgba(42, 20, 50, 0.16); }

/* Lustre — escondido no modo claro */
[data-theme="light"] .hero-chandelier { display: none !important; }

/* Marquee */
[data-theme="light"] .marquee {
  background-color: rgba(196, 168, 122, 0.90);
  border-top-color:    rgba(160, 128, 72, 0.35);
  border-bottom-color: rgba(160, 128, 72, 0.35);
  box-shadow: inset 0 3px 12px rgba(160, 128, 72, 0.15),
              inset 0 -3px 12px rgba(160, 128, 72, 0.15);
}
[data-theme="light"] .marquee::before {
  display: none;
}
[data-theme="light"] .marquee-item        { color: #2a1800; }
[data-theme="light"] .marquee-item .dot   { background: #7a5820; }
[data-theme="light"] .marquee-item .country { color: #6a4c1c; }
[data-theme="light"] .marquee-item .ital  { color: #3d2800; }

/* Imagem placeholder */
[data-theme="light"] .img-placeholder {
  background:
    repeating-linear-gradient(135deg,
      rgba(42, 20, 50, 0.03) 0px,
      rgba(42, 20, 50, 0.03) 1px,
      transparent 1px,
      transparent 14px),
    linear-gradient(135deg, var(--ink-2) 0%, var(--ink-3) 60%, var(--ink-2) 100%);
  border-color: rgba(42, 20, 50, 0.08);
}
[data-theme="light"] .img-placeholder::before {
  background: radial-gradient(ellipse at 30% 30%, rgba(122, 92, 56, 0.07) 0%, transparent 55%);
}
[data-theme="light"] .img-placeholder .label          { color: rgba(42, 20, 50, 0.38); }
[data-theme="light"] .img-placeholder .label::before,
[data-theme="light"] .img-placeholder .label::after   { color: rgba(122, 92, 56, 0.48); }

/* Cards de marcas */
/* Cards de marcas — modo claro */
[data-theme="light"] .marcas-grid {
  border-top-color:  rgba(160, 128, 72, 0.22);
  border-left-color: rgba(160, 128, 72, 0.22);
}
[data-theme="light"] .marca {
  background: rgba(196, 168, 122, 0.14);
  border-right-color:  rgba(160, 128, 72, 0.22);
  border-bottom-color: rgba(160, 128, 72, 0.22);
  box-shadow: inset 0 0 0 1px rgba(160, 128, 72, 0.10);
}
[data-theme="light"] .marca:hover {
  background: rgba(110, 70, 130, 0.12);
  box-shadow: inset 0 0 40px rgba(110, 70, 130, 0.10),
              inset 0 0 0 1px rgba(184, 160, 130, 0.38);
}

/* ============================================================
   Botão de alternância de tema — dentro da nav
   ============================================================ */
.nav-theme-toggle {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 1px solid rgba(184, 160, 130, 0.35);
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  outline: none;
  flex-shrink: 0;
  margin-left: 8px;
  transition:
    transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
    border-color 0.35s ease;
}
.nav-theme-toggle:hover {
  transform: scale(1.12);
  border-color: rgba(184, 160, 130, 0.78);
}
[data-theme="light"] .nav-theme-toggle {
  border-color: rgba(42, 20, 50, 0.22);
}
[data-theme="light"] .nav-theme-toggle:hover {
  border-color: rgba(42, 20, 50, 0.52);
}
/* Acessibilidade: reduz movimento para quem configura "menos animações" no sistema */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
    scroll-behavior: auto !important;
  }
  .reveal, .reveal-slide { opacity: 1 !important; transform: none !important; }
  .carousel-slide .slide-img { transform: none !important; }
}

/* Mobile: remove o backdrop-blur da navbar (recalculado a cada frame durante o
   scroll = jank no celular). Fundo um pouco mais sólido p/ manter a legibilidade. */
@media (max-width: 760px) {
  .nav.scrolled {
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    background: linear-gradient(135deg, rgba(42, 18, 54, 0.96) 0%, rgba(14, 8, 22, 0.97) 100%);
  }
  [data-theme="light"] .nav.scrolled {
    background: rgba(196, 168, 122, 0.96);
  }
  /* sobre o carrossel: transparente tbm no mobile. Especificidade extra
     (.scrolled.over-media) p/ vencer o .nav.scrolled opaco acima. */
  .nav.scrolled.over-media,
  [data-theme="light"] .nav.scrolled.over-media {
    background: linear-gradient(to bottom,
      rgba(8, 5, 12, 0.55) 0%,
      rgba(8, 5, 12, 0.28) 45%,
      rgba(8, 5, 12, 0) 100%);
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    border-bottom-color: transparent;
    box-shadow: none;
  }
}

/* Legibilidade no mobile: Bodoni (--display) e Cormorant (--serif) em peso leve
   deixam hastes finíssimas (perna do "m", haste do "t") que "somem" em telas
   pequenas de alta densidade. Só no mobile: (1) travar o optical-sizing do
   Bodoni p/ engrossar as finas — mesmo truque do .hero-title — e (2) subir o
   peso 300→400 nos textos pequenos e de leitura. Desktop fica intacto. */
@media (max-width: 760px) {
  .section-title, .carousel-name, .contato-title {
    font-optical-sizing: none;
    font-variation-settings: "opsz" 22, "wght" 300;
  }
  .carousel-num, .gb-name, .marca-name, .gb-num {
    font-optical-sizing: none;
    font-variation-settings: "opsz" 22, "wght" 400;
    font-weight: 400;
  }
  .section-lead, .hero-tagline, .contato-lead, .sobre-text p,
  .contato-block .block-value, .carousel-desc {
    font-weight: 400;
  }
}
